name: release

# Builds `gitm-<arch>-<os>.tar.gz` release assets for each target and attaches
# them to the GitHub Release created on tag push. `gitm update` downloads the
# asset matching the current host's ARCH/OS markers.
#
# The Intel macOS (x86_64-darwin) asset is cross-compiled on an Apple-silicon
# runner (macos-14) to avoid the scarce macos-13 Intel runner pool. gitm's deps
# are all pure Rust, so no C cross-toolchain is needed.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: aarch64
            os_mark: darwin
            target: aarch64-apple-darwin
          - os: macos-14
            arch: x86_64
            os_mark: darwin
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            arch: x86_64
            os_mark: linux
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            arch: aarch64
            os_mark: linux
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          tar czf gitm-${{ matrix.arch }}-${{ matrix.os_mark }}.tar.gz \
            -C target/${{ matrix.target }}/release gitm
      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: gitm-${{ matrix.arch }}-${{ matrix.os_mark }}.tar.gz
          generate_release_notes: true
